<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tweaky</title>
    <style>
        body {
            background-image: url('https://i.gifer.com/LoBg.gif');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;            
            text-shadow: 0 0 2px #00ff99;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .terminal-box {
            background: rgba(0, 0, 0, 0.85);
            padding: 2rem;
            border: 2px solid #4711ce;
            border-radius: 8px;
            box-shadow: 0 0 15px #4711ce;
            width: 90%;
            max-width: 600px;
        }

        h1 {
            margin-top: 0;
            font-size: 2rem;
            text-align: center;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.5rem;
            background: black;
            color: #00ff99;
            border: 1px solid #00ff99;
            font-size: 1rem;
        }

        button {
            margin-top: 1rem;
            width: 100%;
            padding: 0.5rem;
            background: black;
            color: #00ff99;
            border: 1px solid #00ff99;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
        }

        button:hover {
            background-color: #00ff99;
            color: black;
        }

        #result {
            margin-top: 1.5rem;
            text-align: center;
        }

        img {
            max-width: 100%;
            border: 1px solid #00ff99;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="terminal-box">
        <h1>🧪 Tweaky</h1>
        <input type="text" id="imgUrl" placeholder="Paste image URL here..." />
        <button onclick="tweak()">Tweak</button>
        <div id="result"></div>
    </div>

    <script>
        function tweak() {
            const url = document.getElementById('imgUrl').value;
            if (!url) return alert("Please enter a URL");

            fetch(`/api/v1/imageproxy?url=${encodeURIComponent(url)}`)
                .then(resp => {
                    if (!resp.ok) throw new Error("Tweak failed");
                    return resp.blob();
                })
                .then(blob => {
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(blob);
                    const resultDiv = document.getElementById('result');
                    resultDiv.innerHTML = '';
                    resultDiv.appendChild(img);
                })
                .catch(err => {
                    alert("Error: " + err.message);
                });
        }
    </script>
</body>
</html>
